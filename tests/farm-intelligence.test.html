<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AureumRO — Testes de Inteligência de Farm (Fase 3)</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0c16;
      color: #e2e8f0;
      margin: 0;
      padding: 30px;
    }
    h1 {
      color: #f5dc82;
      font-size: 24px;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .summary-box {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: #16182a;
      border: 1px solid #2d314d;
      border-radius: 8px;
      padding: 15px 20px;
      min-width: 140px;
    }
    .stat-card span {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card strong {
      display: block;
      font-size: 24px;
      margin-top: 5px;
    }
    .stat-card.pass strong { color: #4ade80; }
    .stat-card.fail strong { color: #f87171; }
    
    .test-section {
      background: #16182a;
      border: 1px solid #2d314d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .test-section h2 {
      margin-top: 0;
      font-size: 16px;
      color: #cbd5e1;
      border-bottom: 1px solid #2d314d;
      padding-bottom: 10px;
    }
    .test-case {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .test-case:last-child {
      border-bottom: none;
    }
    .test-name {
      font-weight: 500;
    }
    .test-detail {
      color: #94a3b8;
      font-size: 11px;
      font-family: monospace;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.pass {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }
    .badge.fail {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }
  </style>
</head>
<body>
  <h1>🌾 AureumRO — Testes de Inteligência de Farm (Fase 3)</h1>
  <div class="subtitle">Validação automatizada de peso de inventário, custos itemizados, tempo até o drop alvo e alertas acionáveis.</div>

  <div class="summary-box">
    <div class="stat-card pass">
      <span>Testes Passaram</span>
      <strong id="total-pass">0</strong>
    </div>
    <div class="stat-card fail">
      <span>Testes Falharam</span>
      <strong id="total-fail">0</strong>
    </div>
    <div class="stat-card">
      <span>Taxa de Sucesso</span>
      <strong id="success-rate">0%</strong>
    </div>
  </div>

  <div id="test-results"></div>

  <!-- Carrega as dependências do projeto -->
  <script src="../character-effects.js"></script>
  <script src="../app.js"></script>

  <script>
    'use strict';

    const resultsContainer = document.getElementById('test-results');
    let passCount = 0;
    let failCount = 0;

    function assert(sectionTitle, name, condition, detail = '') {
      let sectionEl = document.getElementById('sec-' + sectionTitle.replace(/\s+/g, '-'));
      if (!sectionEl) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'test-section';
        sectionEl.id = 'sec-' + sectionTitle.replace(/\s+/g, '-');
        sectionEl.innerHTML = `<h2>${sectionTitle}</h2><div class="cases-wrap"></div>`;
        resultsContainer.appendChild(sectionEl);
      }
      const wrap = sectionEl.querySelector('.cases-wrap');

      const caseEl = document.createElement('div');
      caseEl.className = 'test-case';

      if (condition) {
        passCount++;
        caseEl.innerHTML = `
          <div>
            <span class="test-name">${name}</span>
            <div class="test-detail">${detail}</div>
          </div>
          <span class="badge pass">✓ PASS</span>
        `;
      } else {
        failCount++;
        caseEl.innerHTML = `
          <div>
            <span class="test-name" style="color:#f87171;">${name}</span>
            <div class="test-detail">${detail}</div>
          </div>
          <span class="badge fail">✗ FAIL</span>
        `;
      }
      wrap.appendChild(caseEl);
      updateSummary();
    }

    function updateSummary() {
      document.getElementById('total-pass').textContent = passCount;
      document.getElementById('total-fail').textContent = failCount;
      const total = passCount + failCount;
      const rate = total > 0 ? Math.round((passCount / total) * 100) : 0;
      document.getElementById('success-rate').textContent = rate + '%';
    }

    // ─── SUITE DE TESTES FASE 3 ──────────────────

    window.addEventListener('DOMContentLoaded', () => {
      // 1. Limite de Peso
      const weightCap = getCharacterWeightCapacity();
      assert('1. Modelo de Peso e Inventário', 'Função getCharacterWeightCapacity() retorna valor >= 2000', weightCap >= 2000, `Capacidade calculada: ${weightCap} kg`);

      // 2. Custos Itemizados
      const dummyCosts = calculateItemizedCosts({}, 60, 50, 50);
      assert('2. Custos de Farm Itemizados', 'calculateItemizedCosts() retorna objeto com propriedades itemizadas', 
        typeof dummyCosts.manualCostHour === 'number' && typeof dummyCosts.totalCostHour === 'number',
        `Custo total calculado: ${dummyCosts.totalCostHour} z/h`);

      // 3. Métricas de Hunt (Mock Mob)
      const mockMob = {
        id: 1002,
        nome: 'Poring',
        nivel: 1,
        hp: 50,
        def: 0,
        mdef: 0,
        agi: 1,
        des: 1,
        raca: 'Planta',
        tamanho: 'Médio',
        elemento: 'Água 1',
        exp_base: 2,
        exp_classe: 2
      };
      
      const metrics = calculateHuntMetrics(mockMob);
      assert('3. Métricas Avançadas de Farm', 'calculateHuntMetrics() retorna peso de inventário e penalty de viagem', 
        typeof metrics.weightCapacity === 'number' && typeof metrics.travelPenaltyFactor === 'number',
        `Penalidade de viagem: ${metrics.travelPenaltyFactor}`);

      assert('3. Métricas Avançadas de Farm', 'calculateHuntMetrics() calcula estimativas de horas até 50%/90% de peso', 
        metrics.hoursToFill50 > 0 && metrics.hoursToFill90 > 0,
        `Horas até 50%: ${metrics.hoursToFill50.toFixed(2)}h`);

      // 4. Motor de Alertas Acionáveis
      const alerts = generateActionableAlerts(mockMob, metrics);
      assert('4. Alertas Acionáveis', 'generateActionableAlerts() gera array de alertas', Array.isArray(alerts));

      // 5. Função de Salvar Hunt
      assert('5. Histórico e Diário de Sessão', 'saveCurrentHunt existe e é invocável', typeof saveCurrentHunt === 'function');
    });
  </script>
</body>
</html>
