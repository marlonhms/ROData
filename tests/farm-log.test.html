<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AureumRO — Testes do Diário de Farm (Fase 5)</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0c16;
      color: #e2e8f0;
      margin: 0;
      padding: 30px;
    }
    h1 { color: #f5dc82; font-size: 24px; margin-bottom: 5px; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
    .summary-box { display: flex; gap: 20px; margin-bottom: 25px; }
    .stat-card { background: #16182a; border: 1px solid #2d314d; border-radius: 8px; padding: 15px 20px; min-width: 140px; }
    .stat-card span { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card strong { display: block; font-size: 24px; margin-top: 5px; }
    .stat-card.pass strong { color: #4ade80; }
    .stat-card.fail strong { color: #f87171; }
    .test-section { background: #16182a; border: 1px solid #2d314d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .test-section h2 { margin-top: 0; font-size: 16px; color: #cbd5e1; border-bottom: 1px solid #2d314d; padding-bottom: 10px; }
    .test-case { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .test-case:last-child { border-bottom: none; }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge.pass { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
    .badge.fail { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
  </style>
</head>
<body>
  <h1>📊 AureumRO — Testes de Metas e Diário de Farm (Fase 5)</h1>
  <div class="subtitle">Validação automatizada da calculadora de metas, log de sessões reais e cálculo de eficiência.</div>

  <div class="summary-box">
    <div class="stat-card pass">
      <span>Testes Passaram</span>
      <strong id="total-pass">0</strong>
    </div>
    <div class="stat-card fail">
      <span>Testes Falharam</span>
      <strong id="total-fail">0</strong>
    </div>
    <div class="stat-card">
      <span>Taxa de Sucesso</span>
      <strong id="success-rate">0%</strong>
    </div>
  </div>

  <div id="test-results"></div>

  <script src="../character-effects.js"></script>
  <script src="../app.js"></script>

  <script>
    'use strict';
    const resultsContainer = document.getElementById('test-results');
    let passCount = 0;
    let failCount = 0;

    function assert(sectionTitle, name, condition, detail = '') {
      let sectionEl = document.getElementById('sec-' + sectionTitle.replace(/\s+/g, '-'));
      if (!sectionEl) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'test-section';
        sectionEl.id = 'sec-' + sectionTitle.replace(/\s+/g, '-');
        sectionEl.innerHTML = `<h2>${sectionTitle}</h2><div class="cases-wrap"></div>`;
        resultsContainer.appendChild(sectionEl);
      }
      const wrap = sectionEl.querySelector('.cases-wrap');
      const caseEl = document.createElement('div');
      caseEl.className = 'test-case';

      if (condition) {
        passCount++;
        caseEl.innerHTML = `<div><span class="test-name">${name}</span><div style="color:#94a3b8; font-size:11px; font-family:monospace;">${detail}</div></div><span class="badge pass">✓ PASS</span>`;
      } else {
        failCount++;
        caseEl.innerHTML = `<div><span class="test-name" style="color:#f87171;">${name}</span><div style="color:#94a3b8; font-size:11px; font-family:monospace;">${detail}</div></div><span class="badge fail">✗ FAIL</span>`;
      }
      wrap.appendChild(caseEl);
      updateSummary();
    }

    function updateSummary() {
      document.getElementById('total-pass').textContent = passCount;
      document.getElementById('total-fail').textContent = failCount;
      const total = passCount + failCount;
      const rate = total > 0 ? Math.round((passCount / total) * 100) : 0;
      document.getElementById('success-rate').textContent = rate + '%';
    }

    window.addEventListener('DOMContentLoaded', () => {
      // 1. Funções de Diário
      assert('1. Diário & Metas', 'initJournal existe e é invocável', typeof initJournal === 'function');
      assert('2. Persistência de Logs', 'saveFarmLog persiste logs no localStorage', typeof saveFarmLog === 'function');

      // Test Log Save
      const initialCount = APP.farmLogs.length;
      saveFarmLog({
        id: 99999,
        date: new Date().toISOString(),
        mobId: 1002,
        durationMin: 60,
        zenyGained: 100000,
        potionCost: 10000,
        deaths: 0
      });

      assert('2. Persistência de Logs', 'saveFarmLog adicionou novo log', APP.farmLogs.length === initialCount + 1);

      // Clean test entry
      APP.farmLogs = APP.farmLogs.filter(l => l.id !== 99999);
      localStorage.setItem('aureum_farm_logs', JSON.stringify(APP.farmLogs));
    });
  </script>
</body>
</html>
