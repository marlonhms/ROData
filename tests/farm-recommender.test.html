<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AureumRO — Testes do Recomendador (Fase 4)</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0c16;
      color: #e2e8f0;
      margin: 0;
      padding: 30px;
    }
    h1 {
      color: #f5dc82;
      font-size: 24px;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .summary-box {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: #16182a;
      border: 1px solid #2d314d;
      border-radius: 8px;
      padding: 15px 20px;
      min-width: 140px;
    }
    .stat-card span {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card strong {
      display: block;
      font-size: 24px;
      margin-top: 5px;
    }
    .stat-card.pass strong { color: #4ade80; }
    .stat-card.fail strong { color: #f87171; }
    
    .test-section {
      background: #16182a;
      border: 1px solid #2d314d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .test-section h2 {
      margin-top: 0;
      font-size: 16px;
      color: #cbd5e1;
      border-bottom: 1px solid #2d314d;
      padding-bottom: 10px;
    }
    .test-case {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .test-case:last-child {
      border-bottom: none;
    }
    .test-name {
      font-weight: 500;
    }
    .test-detail {
      color: #94a3b8;
      font-size: 11px;
      font-family: monospace;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.pass {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }
    .badge.fail {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }
  </style>
</head>
<body>
  <h1>🗺️ AureumRO — Testes do Recomendador e Progressão (Fase 4)</h1>
  <div class="subtitle">Validação automatizada de justificativas de recomendação, timeline de progressão, comparador e favoritos.</div>

  <div class="summary-box">
    <div class="stat-card pass">
      <span>Testes Passaram</span>
      <strong id="total-pass">0</strong>
    </div>
    <div class="stat-card fail">
      <span>Testes Falharam</span>
      <strong id="total-fail">0</strong>
    </div>
    <div class="stat-card">
      <span>Taxa de Sucesso</span>
      <strong id="success-rate">0%</strong>
    </div>
  </div>

  <div id="test-results"></div>

  <!-- Carrega dependências -->
  <script src="../character-effects.js"></script>
  <script src="../app.js"></script>

  <script>
    'use strict';

    const resultsContainer = document.getElementById('test-results');
    let passCount = 0;
    let failCount = 0;

    function assert(sectionTitle, name, condition, detail = '') {
      let sectionEl = document.getElementById('sec-' + sectionTitle.replace(/\s+/g, '-'));
      if (!sectionEl) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'test-section';
        sectionEl.id = 'sec-' + sectionTitle.replace(/\s+/g, '-');
        sectionEl.innerHTML = `<h2>${sectionTitle}</h2><div class="cases-wrap"></div>`;
        resultsContainer.appendChild(sectionEl);
      }
      const wrap = sectionEl.querySelector('.cases-wrap');

      const caseEl = document.createElement('div');
      caseEl.className = 'test-case';

      if (condition) {
        passCount++;
        caseEl.innerHTML = `
          <div>
            <span class="test-name">${name}</span>
            <div class="test-detail">${detail}</div>
          </div>
          <span class="badge pass">✓ PASS</span>
        `;
      } else {
        failCount++;
        caseEl.innerHTML = `
          <div>
            <span class="test-name" style="color:#f87171;">${name}</span>
            <div class="test-detail">${detail}</div>
          </div>
          <span class="badge fail">✗ FAIL</span>
        `;
      }
      wrap.appendChild(caseEl);
      updateSummary();
    }

    function updateSummary() {
      document.getElementById('total-pass').textContent = passCount;
      document.getElementById('total-fail').textContent = failCount;
      const total = passCount + failCount;
      const rate = total > 0 ? Math.round((passCount / total) * 100) : 0;
      document.getElementById('success-rate').textContent = rate + '%';
    }

    // ─── SUITE DE TESTES FASE 4 ──────────────────

    window.addEventListener('DOMContentLoaded', () => {
      // 1. Gerador de Razões de Recomendação
      const mockEntry = {
        mob: { id: 1002, nome: 'Poring', nivel: 1, raca: 'Planta', tamanho: 'Médio', elemento: 'Água 1' },
        metrics: {
          hitChance: 100,
          dodgeChance: 95,
          netZenyHour: 50000,
          rawZenyKill: 100,
          drops: [{ name: 'Jellopy', expected: 80 }],
          itemizedCosts: { potionCostHour: 0 },
          bestSpawn: { mapa_nome: 'pay_fild08', qtd: 120 }
        }
      };

      const reasons = generateRecommendationReasons(mockEntry, 'balanced');
      assert('1. Cards Explicativos', 'generateRecommendationReasons() retorna array de razões', Array.isArray(reasons));
      assert('1. Cards Explicativos', 'Detecta alta segurança ou alta densidade', reasons.some(r => r.includes('Alta Segurança') || r.includes('Alta Densidade')), `Razões geradas: ${reasons.join(' | ')}`);

      // 2. Linha do Tempo de Progressão
      assert('2. Rota de Progressão', 'renderProgressionTimeline existe e é invocável', typeof renderProgressionTimeline === 'function');

      // 3. Sistema de Favoritos e Comparação
      toggleFavoriteFarm(1002);
      assert('3. Favoritos e Comparativo', 'toggleFavoriteFarm() adiciona mobId aos favoritos', APP.favoriteFarms.includes(1002));
      toggleFavoriteFarm(1002); // remove
      assert('3. Favoritos e Comparativo', 'toggleFavoriteFarm() remove mobId ao clicar novamente', !APP.favoriteFarms.includes(1002));

      toggleCompareMob(1002);
      assert('3. Favoritos e Comparativo', 'toggleCompareMob() adiciona mobId à lista de comparação', APP.compareList.includes(1002));
      toggleCompareMob(1002); // remove
      assert('3. Favoritos e Comparativo', 'toggleCompareMob() remove mobId ao clicar novamente', !APP.compareList.includes(1002));
    });
  </script>
</body>
</html>
