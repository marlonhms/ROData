<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AureumRO — Testes do Motor de Combate (Fase 2)</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0c16;
      color: #e2e8f0;
      margin: 0;
      padding: 30px;
    }
    h1 {
      color: #f5dc82;
      font-size: 24px;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .summary-box {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: #16182a;
      border: 1px solid #2d314d;
      border-radius: 8px;
      padding: 15px 20px;
      min-width: 140px;
    }
    .stat-card span {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card strong {
      display: block;
      font-size: 24px;
      margin-top: 5px;
    }
    .stat-card.pass strong { color: #4ade80; }
    .stat-card.fail strong { color: #f87171; }
    
    .test-section {
      background: #16182a;
      border: 1px solid #2d314d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .test-section h2 {
      margin-top: 0;
      font-size: 16px;
      color: #cbd5e1;
      border-bottom: 1px solid #2d314d;
      padding-bottom: 10px;
    }
    .test-case {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .test-case:last-child {
      border-bottom: none;
    }
    .test-name {
      font-weight: 500;
    }
    .test-detail {
      color: #94a3b8;
      font-size: 11px;
      font-family: monospace;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.pass {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }
    .badge.fail {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }
  </style>
</head>
<body>
  <h1>⚔️ AureumRO — Testes do Motor de Combate (Fase 2)</h1>
  <div class="subtitle">Validação automatizada de fórmulas, SKILL_DATA, tabelas de elementos, tamanho e crítico.</div>

  <div class="summary-box">
    <div class="stat-card pass">
      <span>Testes Passaram</span>
      <strong id="total-pass">0</strong>
    </div>
    <div class="stat-card fail">
      <span>Testes Falharam</span>
      <strong id="total-fail">0</strong>
    </div>
    <div class="stat-card">
      <span>Taxa de Sucesso</span>
      <strong id="success-rate">0%</strong>
    </div>
  </div>

  <div id="test-results"></div>

  <!-- Carrega as dependências do projeto -->
  <script src="../character-effects.js"></script>
  <script src="../app.js"></script>

  <script>
    'use strict';

    const resultsContainer = document.getElementById('test-results');
    let passCount = 0;
    let failCount = 0;

    function assert(sectionTitle, name, condition, detail = '') {
      let sectionEl = document.getElementById('sec-' + sectionTitle.replace(/\s+/g, '-'));
      if (!sectionEl) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'test-section';
        sectionEl.id = 'sec-' + sectionTitle.replace(/\s+/g, '-');
        sectionEl.innerHTML = `<h2>${sectionTitle}</h2><div class="cases-wrap"></div>`;
        resultsContainer.appendChild(sectionEl);
      }
      const wrap = sectionEl.querySelector('.cases-wrap');

      const caseEl = document.createElement('div');
      caseEl.className = 'test-case';

      if (condition) {
        passCount++;
        caseEl.innerHTML = `
          <div>
            <span class="test-name">${name}</span>
            <div class="test-detail">${detail}</div>
          </div>
          <span class="badge pass">✓ PASS</span>
        `;
      } else {
        failCount++;
        caseEl.innerHTML = `
          <div>
            <span class="test-name" style="color:#f87171;">${name}</span>
            <div class="test-detail">${detail}</div>
          </div>
          <span class="badge fail">✗ FAIL</span>
        `;
      }
      wrap.appendChild(caseEl);
      updateSummary();
    }

    function updateSummary() {
      document.getElementById('total-pass').textContent = passCount;
      document.getElementById('total-fail').textContent = failCount;
      const total = passCount + failCount;
      const rate = total > 0 ? Math.round((passCount / total) * 100) : 0;
      document.getElementById('success-rate').textContent = rate + '%';
    }

    // ─── SUITE DE TESTES ─────────────────────────

    window.addEventListener('DOMContentLoaded', () => {
      // 1. Tabela SKILL_DATA
      assert('1. Tabela de Habilidades (SKILL_DATA)', 'Tabela SKILL_DATA existe', typeof SKILL_DATA !== 'undefined');
      assert('1. Tabela de Habilidades (SKILL_DATA)', 'Bash Lv1 tem multiplicador 1.3 (130%)', SKILL_DATA.bash?.levels[0] === 1.3);
      assert('1. Tabela de Habilidades (SKILL_DATA)', 'Bash Lv10 tem multiplicador 4.0 (400%)', SKILL_DATA.bash?.levels[9] === 4.0);
      assert('1. Tabela de Habilidades (SKILL_DATA)', 'Bowling Bash Lv10 causa 2 hits com mult 5.0', SKILL_DATA.bowling_bash?.hits === 2 && SKILL_DATA.bowling_bash?.levels[9] === 5.0);
      assert('1. Tabela de Habilidades (SKILL_DATA)', 'Fire Bolt é classificado como mágico', SKILL_DATA.fire_bolt?.type === 'magical');
      assert('1. Tabela de Habilidades (SKILL_DATA)', 'Double Strafe é classificado como à distância (ranged)', SKILL_DATA.double_strafe?.type === 'ranged');

      // 2. Helper getSkillInfo
      const bash10Info = getSkillInfo('bash', 10);
      assert('2. Resolver Informações de Skill (getSkillInfo)', 'Bash Lv10 retorna mult 4.0, sp 15', bash10Info.mult === 4.0 && bash10Info.spCost === 15);
      
      const fireBolt5Info = getSkillInfo('fire_bolt', 5);
      assert('2. Resolver Informações de Skill (getSkillInfo)', 'Fire Bolt Lv5 desfecha em 5 hits', fireBolt5Info.hits === 5);

      // 3. Modificadores de Tamanho (SIZE_PENALTY)
      assert('3. Penalidades de Tamanho (SIZE_PENALTY)', 'Adaga causa 100% em Pequeno, 75% em Médio, 50% em Grande', 
        SIZE_PENALTY['Adaga']['Pequeno'] === 1.0 && SIZE_PENALTY['Adaga']['Médio'] === 0.75 && SIZE_PENALTY['Adaga']['Grande'] === 0.5);
      assert('3. Penalidades de Tamanho (SIZE_PENALTY)', 'Espada2M causa 100% em Grande', SIZE_PENALTY['Espada2M']['Grande'] === 1.0);

      // 4. Matriz Elemental (ELEM_MULTI)
      const fogoVsTerra1 = ELEM_MULTI[1]['Fogo']['Terra'];
      assert('4. Multiplicadores Elementais (ELEM_MULTI)', 'Fogo Nv1 causa 150% em Terra Nv1', fogoVsTerra1 === 1.5);

      const fogoVsAgua1 = ELEM_MULTI[1]['Fogo']['Agua'];
      assert('4. Multiplicadores Elementais (ELEM_MULTI)', 'Fogo Nv1 causa 90% em Água Nv1', fogoVsAgua1 === 0.9);

      const sagradoVsSombrio4 = ELEM_MULTI[4]['Sagrado']['Sombrio'];
      assert('4. Multiplicadores Elementais (ELEM_MULTI)', 'Sagrado Nv4 causa 200% em Sombrio Nv4', sagradoVsSombrio4 === 2.0);

      // 5. Badges de Dano & Confiança
      const badgePhys = getDamageTypeBadge('physical');
      assert('5. Badges e Indicadores', 'Damage type physical retorna ícone ⚔️', badgePhys.icon === '⚔️');
      
      const badgeConf = getConfidenceBadge('complete', []);
      assert('5. Badges e Indicadores', 'Confidence level complete retorna badge verde 🟢', badgeConf.icon === '🟢');

      // 6. Painel "Como chegamos neste dano?" (Breakdown)
      const dummySteps = [
        { label: 'ATQ Base', formula: 'FOR×1', value: '100' },
        { label: 'Resultado', formula: 'Total', value: '100', tone: 'total' }
      ];
      const breakdownHtml = renderDamageBreakdown(dummySteps);
      assert('6. Motor de Breakdown', 'renderDamageBreakdown gera HTML com classe .damage-breakdown', breakdownHtml.includes('class="damage-breakdown"'));
      assert('6. Motor de Breakdown', 'Breakdown inclui botão com o texto "Como chegamos neste dano?"', breakdownHtml.includes('Como chegamos neste dano?'));
    });
  </script>
</body>
</html>
